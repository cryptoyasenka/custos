name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Audit prod deps (high+)
        # Prod-only: devDeps (vitest, @sqds/multisig) carry their own CVE chains
        # that never ship to operators. We only fail if something in `dist/`'s
        # runtime closure has a high-severity advisory.
        run: npm audit --omit=dev --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json

      - name: Install dashboard deps
        run: npm ci
        working-directory: dashboard

      - name: Typecheck (dashboard)
        run: npx tsc --noEmit
        working-directory: dashboard

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
